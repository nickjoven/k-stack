name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - name: Test
        run: cargo test

      - name: Verify tool count
        run: |
          COUNT=$(echo '{"jsonrpc":"2.0","id":1,"method":"tools/list","params":{}}' \
            | KET_HOME=/tmp/ci-test ./target/release/k-stack 2>/dev/null \
            | python3 -c "import sys,json; print(len(json.load(sys.stdin)['result']['tools']))")
          echo "Tools: $COUNT"
          [ "$COUNT" -eq 15 ] || (echo "Expected 15 tools, got $COUNT" && exit 1)
